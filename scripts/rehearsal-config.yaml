        threshold_db: -14
        ratio: 4
        attack_ms: 0.1
        release_ms: 210
        knee_db: 18

    "02 GUIT MIX":
      gain_db: -8

    "04 KEYS MIX":
      gain_db: -14

    "09 BACKING VOC":
      compression:
        threshold_db: -20
        ratio: 3
        attack_ms: 20
        release_ms: 200
        knee_db: 6
      gain_db: -4

    "10 LEAD VOCAL":
