audio:
  mp3_bitrate: "320k"
  normalize_peak_db: -1

tracks:
  per_track:

    "01 BASS":
      loudnorm:
        integrated_loudness: -18

    "02 GUIT MIX":
      gain_db: -8

    "04 KEYS MIX":
      gain_db: -14

    "09 BACKING VOC":
      loudnorm:
        integrated_loudness: -18

    "10 LEAD VOCAL":
      loudnorm:
        integrated_loudness: -20

    "11 DRUMS MIX":
      loudnorm:
        integrated_loudness: -18

  mixes:
    
    - output: "02 GUIT MIX"
      sources:
        - file: "02 GUIT DI"
          pan: 10
        - file: "03 GUIT MIC"
          pan: -5
          gain_db: -15
    - output: "04 KEYS MIX"
      sources:
        - file: "04 KEYS L"
          pan: -100
        - file: "05 KEYS R"
          pan: 100
    - output: "11 DRUMS MIX"
      sources:
        - file: "11 DR KICK"
          pan: 20
        - file: "12 DR HH SD"
          pan: -20

  exclude:

    - "20 AMBIANCE"

