audio:
  mp3_bitrate: "320k"
  normalize_peak_db: -1
  compression:
    threshold_db: -20
    ratio: 3
    attack_ms: 20
    release_ms: 200
    knee_db: 6

tracks:
  per_track:

    "01 BASS":
      normalize_mode: rms
      normalize_db: -18
      compression:
        threshold_db: -30   # seuil plus bas → compresse plus tôt, booste les passages doux
        ratio: 5            # plus de tenue, moins de dynamique
        attack_ms: 30       # laisse passer l'attaque de plectre avant de comprimer
        release_ms: 150
        knee_db: 4

    "11 DRUMS MIX":
      normalize_mode: rms
      normalize_db: -12
      gain_db: 2
      compression:
        threshold_db: -24   # seuil plus bas que global
        ratio: 6            # ratio assez fort pour niveler les coups
        attack_ms: 8        # attaque rapide pour attraper les transitoires de kick
        release_ms: 80      # relâchement court pour le punch
        knee_db: 3

  mixes:
    - output: "04 KEYS MIX"
      sources:
        - file: "04 KEYS L"
          pan: -100
        - file: "05 KEYS R"
          pan: 100
    - output: "11 DRUMS MIX"
      sources:
        - file: "11 DR KICK"
          pan: 20
        - file: "12 DR HH SD"
          pan: -20

  exclude:
    - "20 AMBIANCE"
