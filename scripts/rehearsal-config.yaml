        threshold_db: -20
        ratio: 3
        attack_ms: 20
        release_ms: 200
        knee_db: 6
      gain_db: 2

    "11 DRUMS MIX":
      normalize_mode: rms
      normalize_db: -12
      gain_db: 2

  mixes:
    
    - output: "02 GUIT MIX"
