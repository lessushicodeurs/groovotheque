audio:
  mp3_bitrate: "320k"
  normalize_peak_db: -1   # cible de peak par défaut pour toutes les pistes
  compression:
    threshold_db: -20
    ratio: 3
    attack_ms: 20
    release_ms: 200
    knee_db: 6

tracks:
  # Réglages par piste (optionnel — remplace les valeurs globales)
  # normalize_mode: peak (défaut) | rms
  #   peak → cible le pic maximum (normalize_peak_db global par défaut)
  #   rms  → cible le niveau moyen perçu (meilleur pour basse et batterie)
  # normalize_db: cible en dBFS (peak ou rms selon le mode)
  # gain_db: gain additionnel après normalisation (trim de mix, peut dépasser 0 dBFS
  #          — le script applique un limiteur safety à -1 dBFS automatiquement)
  per_track:
    "01 BASS":
      normalize_mode: rms
      normalize_db: -18
    "11 DRUMS MIX":
      normalize_mode: rms
      normalize_db: -12
      gain_db: 2

  mixes:
    - output: "04 KEYS MIX"
      sources:
        - file: "04 KEYS L"
          pan: -100
        - file: "05 KEYS R"
          pan: 100
    - output: "11 DRUMS MIX"
      sources:
        - file: "11 DR KICK"
          pan: 20
        - file: "12 DR HH SD"
          pan: -20

  exclude:
    - "20 AMBIANCE"
