audio:
  mp3_bitrate: "320k"

tracks:
  per_track:

    "01 BASS":
      effects:
        - type: compress
          preset: "Bass Guitar"
        - type: normalize
        - type: compress
          preset: "Bass Guitar"
        - type: normalize

    "02 GUIT MIX":
      effects:
        - type: normalize
        - type: gain
          db: -8

    "04 KEYS MIX":
      effects:
        - type: normalize
        - type: gain
          db: -14

    "09 BACKING VOC":
      effects:
        - type: compress
          preset: "Lead Vocals"
        - type: normalize
        - type: compress
          preset: "Lead Vocals"
        - type: normalize

    "10 LEAD VOC":
      effects:
        - type: compress
          preset: "Lead Vocals"
        - type: normalize
          target_db: -2
        - type: compress
          preset: "Lead Vocals"
        - type: normalize
          target_db: -2

    "11 DR KICK":
      effects:
        - type: compress
          preset: "Kick Drums"
        - type: normalize
        - type: compress
          preset: "Kick Drums"
        - type: normalize

    "12 DR HH SD":
      effects:
        - type: compress
          preset: "Modern"
        - type: normalize
        - type: compress
          preset: "Modern"
        - type: normalize

  mixes:

    - output: "02 GUIT MIX"
      sources:
        - file: "02 GUIT DI"
          pan: 10
        - file: "03 GUIT MIC"
          pan: -5
          gain_db: -15
    - output: "04 KEYS MIX"
      sources:
        - file: "04 KEYS L"
          pan: -100
        - file: "05 KEYS R"
          pan: 100
    - output: "11 DRUMS MIX"
      sources:
        - file: "11 DR KICK"
          pan: 20
        - file: "12 DR HH SD"
          pan: -20

  exclude:

    - "20 AMBIANCE"

blabla_mix:
  pans:
    "01 BASS": 0
    "02 GUIT MIX": 0
    "04 KEYS MIX": 0
    "09 BACKING VOC": 0
    "10 LEAD VOC": 0
    "11 DRUMS MIX": 0
