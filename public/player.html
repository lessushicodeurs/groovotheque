<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player — Groovotheque</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="load-bar" role="progressbar" aria-label="Chargement des pistes" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
  <header class="site-header player-header">
    <a id="back-btn" class="back-link" href="/" aria-label="Retour">←</a>
    <nav id="player-breadcrumb" class="breadcrumb breadcrumb--player" aria-label="Navigation"></nav>
    <h1 id="groove-title">…</h1>
    <button id="btn-prev" class="nav-btn" aria-label="Groove précédent" disabled>‹</button>
    <button id="btn-next" class="nav-btn" aria-label="Groove suivant" disabled>›</button>
    <button id="btn-save-mix" class="btn-save-mix" hidden>Sauvegarder le mix</button>
    <button id="btn-download-all" class="btn-download-all" hidden>↓ Tout télécharger</button>
  </header>
  <main id="player-main" class="loading">
    <div id="tracks-container" class="tracks-container" hidden></div>
    <div id="minimap-container" class="minimap-container" hidden></div>
  </main>
  <div id="transport-drawer" class="transport-drawer" hidden>
    <button id="transport-handle" class="transport-handle" aria-expanded="true" aria-label="Ouvrir/fermer le transport">
      <span class="transport-handle-pill"></span>
    </button>
    <div id="transport" class="transport">
      <div class="transport-row">
        <button id="btn-loop-go-in"  class="transport-btn transport-btn--marker-nav" aria-label="Région précédente">⏮</button>
        <button id="btn-play" class="transport-btn" aria-label="Lecture / Pause">▶</button>
        <button id="btn-stop" class="transport-btn transport-btn--stop" aria-label="Stop">■</button>
        <button id="btn-loop-go-out" class="transport-btn transport-btn--marker-nav" aria-label="Région suivante">⏭</button>
        <div class="transport-time">
          <span id="timecode" class="timecode">0:00.000</span>
          <span class="timecode-sep">/</span>
          <span id="duration" class="timecode timecode--dim">—</span>
        </div>
        <div id="seek-bar" class="seek-bar" role="slider" aria-label="Position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="seek-fill" class="seek-fill"></div>
        </div>
        <div class="transport-loop">
          <span class="loop-label">IN</span>
          <input id="loop-in" class="loop-input" type="text" value="—" aria-label="Point IN" disabled>
          <span class="loop-label">OUT</span>
          <input id="loop-out" class="loop-input" type="text" value="—" aria-label="Point OUT" disabled>
          <button id="btn-loop" class="transport-btn transport-btn--loop" aria-label="Boucle" aria-pressed="false">⟳</button>
          <button id="btn-loop-clear" class="transport-btn transport-btn--loop-clear" aria-label="Supprimer la boucle" disabled>✕</button>
        </div>
      </div>
      <div class="transport-row transport-row--tempo">
        <span class="tempo-label">TEMPO</span>
        <span id="tempo-badge" class="tempo-badge" hidden></span>
        <input id="tempo-slider" type="range" min="50" max="120" step="1" value="100"
               class="tempo-slider" aria-label="Tempo (50%–120%)">
        <span id="tempo-value" class="tempo-value">100%</span>
        <div class="tempo-presets">
          <button class="tempo-preset" data-value="50">50%</button>
          <button class="tempo-preset" data-value="75">75%</button>
          <button class="tempo-preset" data-value="90">90%</button>
          <button class="tempo-preset" data-value="100">100%</button>
          <button class="tempo-preset" data-value="110">110%</button>
          <button class="tempo-preset" data-value="120">120%</button>
        </div>
      </div>
    </div>
  </div>
  <!-- 13.2 — Tablature drawer (desktop only, visible si tabFile présent) -->
  <div id="tab-drawer" class="tab-drawer tab-drawer--strip" hidden>
    <div id="tab-handle" class="tab-handle" title="Redimensionner la tablature">
      <div class="tab-handle-grip"></div>
      <div class="tab-drawer-header">
        <span class="tab-drawer-title">Tablature</span>
        <div id="tab-track-list" class="tab-track-list"></div>
        <div id="tab-loop-controls" class="tab-loop-controls" hidden>
          <button id="btn-tab-loop-clear" class="tab-btn" title="Effacer la boucle tablature">✕ boucle</button>
        </div>
        <button id="btn-tab-fullscreen" class="tab-btn tab-btn--state"        title="Plein écran" aria-pressed="false">⛶</button>
        <button id="btn-tab-strip"     class="tab-btn tab-btn--state active" title="Strip"       aria-pressed="true">▬</button>
        <button id="btn-tab-collapse"  class="tab-btn tab-btn--state"        title="Réduire"     aria-pressed="false">−</button>
      </div>
    </div>
    <div id="tab-content" class="tab-content"></div>
  </div>
  <script type="module" src="/js/player.js"></script>
</body>
</html>
