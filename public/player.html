<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player — Groovotheque</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header player-header">
    <a href="/" class="back-link" aria-label="Retour à la liste">←</a>
    <h1 id="groove-title">…</h1>
    <button id="btn-download-all" class="btn-download-all" hidden>↓ Tout télécharger</button>
  </header>
  <main id="player-main">
    <p class="state-msg" id="player-state">Chargement des pistes…</p>
    <div id="tracks-container" class="tracks-container" hidden></div>
    <div id="minimap-container" class="minimap-container" hidden></div>
    <div id="transport" class="transport" hidden>
      <div class="transport-row">
        <button id="btn-play" class="transport-btn" aria-label="Lecture / Pause">▶</button>
        <button id="btn-stop" class="transport-btn transport-btn--stop" aria-label="Stop">■</button>
        <div class="transport-time">
          <span id="timecode" class="timecode">0:00.000</span>
          <span class="timecode-sep">/</span>
          <span id="duration" class="timecode timecode--dim">—</span>
        </div>
        <div id="seek-bar" class="seek-bar" role="slider" aria-label="Position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="seek-fill" class="seek-fill"></div>
        </div>
        <div class="transport-loop">
          <span class="loop-label">IN</span>
          <input id="loop-in" class="loop-input" type="text" value="—" aria-label="Point IN" disabled>
          <span class="loop-label">OUT</span>
          <input id="loop-out" class="loop-input" type="text" value="—" aria-label="Point OUT" disabled>
          <button id="btn-loop" class="transport-btn transport-btn--loop" aria-label="Boucle" aria-pressed="false">⟳</button>
        </div>
      </div>
      <div class="transport-row transport-row--tempo">
        <span class="tempo-label">TEMPO</span>
        <span id="tempo-badge" class="tempo-badge" hidden></span>
        <input id="tempo-slider" type="range" min="50" max="120" step="1" value="100"
               class="tempo-slider" aria-label="Tempo (50%–120%)">
        <span id="tempo-value" class="tempo-value">100%</span>
        <div class="tempo-presets">
          <button class="tempo-preset" data-value="50">50%</button>
          <button class="tempo-preset" data-value="75">75%</button>
          <button class="tempo-preset" data-value="90">90%</button>
          <button class="tempo-preset" data-value="100">100%</button>
          <button class="tempo-preset" data-value="110">110%</button>
          <button class="tempo-preset" data-value="120">120%</button>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="/js/player.js"></script>
</body>
</html>
